<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ΓΗΛΟΦΟΣ - Seismos Live</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        canvas { width: 600px; height: 600px; max-width: 95vw; max-height: 95vw; aspect-ratio: 1 / 1; }
    </style>
</head>
<body>
<canvas id="c" width="800" height="800"></canvas>
<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = 'face.png';

    let lastSeismos = "ΕΝΗΜΕΡΩΣΗ...";
    let seismosColor = "#39FF14";

    // ΝΕΑ ΛΕΙΤΟΥΡΓΙΑ - ΠΙΟ ΓΡΗΓΟΡΗ ΚΑΙ ΣΙΓΟΥΡΗ
    async function checkSeismos() {
        try {
            // Ζητάμε σεισμούς άνω των 2.5R στην περιοχή της Ελλάδας
            const url = 'https://usgs.gov';
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.features && data.features.length > 0) {
                const latest = data.features[0].properties;
                const mag = latest.mag.toFixed(1);
                let place = latest.place.split(' of ').pop().toUpperCase();
                lastSeismos = `ΣΕΙΣΜΟΣ: ${mag}R - ${place}`;
                // Χρώμα ανάλογα με την ένταση
                if (mag >= 5) seismosColor = "#FF0000";
                else if (mag >= 4) seismosColor = "#FFA500";
                else seismosColor = "#39FF14";
            } else {
                lastSeismos = "ΗΣΥΧΙΑ ΣΤΟΝ ΓΗΛΟΦΟ";
                seismosColor = "#39FF14";
            }
        } catch (e) { 
            lastSeismos = "ΕΛΕΓΧΟΣ ΣΥΝΔΕΣΗΣ..."; 
        }
    }

    checkSeismos();
    setInterval(checkSeismos, 30000); // Έλεγχος κάθε 30 δευτερόλεπτα

    function draw() {
        const now = new Date();
        const s = now.getSeconds() + now.getMilliseconds() / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;
        
        ctx.clearRect(0, 0, 800, 800);
        if (img.complete) ctx.drawImage(img, 0, 0, 800, 800);
        
        const green = "#39FF14";
        const cx = 400, cy = 400;

        ctx.textAlign = "center";
        
        // 1. Ημερομηνία (Κάτω από το 12)
        ctx.fillStyle = green;
        ctx.font = "bold 24px Arial";
        const dateStr = now.toLocaleDateString('el-GR', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
        ctx.fillText(dateStr, cx, 310);

        // 2. Σεισμός (Πάνω από το 6)
        ctx.fillStyle = seismosColor;
        ctx.font = "bold 22px Arial";
        ctx.fillText(lastSeismos, cx, 510);

        // Δείκτες
        drawH(h * 30, 180, 15, green);
        drawH(m * 6, 280, 10, green);

        // ΓΗΛΟΦΟΣ (Δευτερόλεπτα)
        const ang = s * 6;
        const rad = (ang - 90) * Math.PI / 180;
        ctx.beginPath(); ctx.strokeStyle = green; ctx.lineWidth = 2;
        ctx.moveTo(cx, cy); ctx.lineTo(cx + 360 * Math.cos(rad), cy + 360 * Math.sin(rad));
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy); ctx.rotate(rad);
        ctx.font = "bold 42px Arial"; ctx.textBaseline = "bottom"; 
        if (ang > 0 && ang < 180) { ctx.fillText("ΓΗΛΟΦΟΣ", 190, -5); } 
        else { ctx.rotate(Math.PI); ctx.fillText("ΓΗΛΟΦΟΣ", -190, -5); }
        ctx.restore();

        ctx.beginPath(); ctx.arc(cx, cy, 12, 0, 2*Math.PI); ctx.fillStyle = green; ctx.fill();
        requestAnimationFrame(draw);
    }

    function drawH(a, l, w, c) {
        const r = (a - 90) * Math.PI / 180;
        ctx.beginPath(); ctx.strokeStyle = c; ctx.lineWidth = w; ctx.lineCap = "round";
        ctx.moveTo(400, 400); ctx.lineTo(400 + l * Math.cos(r), 400 + l * Math.sin(r));
        ctx.stroke();
    }
    img.onload = () => draw();
</script>
</body>
</html>
