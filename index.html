<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json?v=3">
    <link rel="icon" type="image/png" href="icon2026.png">
    <link rel="apple-touch-icon" href="icon2026.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <title>ΩΡΑ ΓΗΛΟΦΟΥ</title>
    <style>
        body { 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        canvas { 
            width: 600px; 
            height: 600px; 
            max-width: 90vw; /* Λίγο πιο μικρό για να μην κολλάει στις άκρες του κινητού */
            max-height: 90vw; 
            aspect-ratio: 1 / 1; 
        }
    </style>
</head>
<body>
<canvas id="c" width="800" height="800"></canvas>
<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = 'face.png';

    function draw() {
        const now = new Date();
        const s = now.getSeconds() + now.getMilliseconds() / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;
        
        ctx.clearRect(0, 0, 800, 800);
        
        const green = "#39FF14";
        const cx = 400, cy = 400;

        // 1. ΣΧΕΔΙΑΣΗ ΕΞΩΤΕΡΙΚΟΥ ΠΛΑΙΣΙΟΥ (Ο ΚΥΚΛΟΣ ΠΟΥ ΗΘΕΛΕΣ)
        ctx.beginPath();
        ctx.arc(cx, cy, 390, 0, 2 * Math.PI); // Σχεδόν στην άκρη του canvas
        ctx.strokeStyle = green;
        ctx.lineWidth = 15; // Παχύ πλαίσιο για στυλ
        ctx.stroke();

        // 2. ΣΧΕΔΙΑΣΗ ΤΗΣ ΕΙΚΟΝΑΣ (FACE) ΜΕΣΑ ΣΤΟ ΠΛΑΙΣΙΟ
        if (img.complete) ctx.drawImage(img, 10, 10, 780, 780);
        
        // Σχέδιαση Δεικτών
        drawH(h * 30, 200, 15, green);
        drawH(m * 6, 300, 10, green);

        // 3. ΔΕΥΤΕΡΟΛΕΠΤΗΣ (ΓΗΛΟΦΟΣ) - Τον κονταίνουμε ελάχιστα για να μη βρίσκει στο πλαίσιο
        const ang = s * 6;
        const rad = (ang - 90) * Math.PI / 180;
        
        ctx.beginPath();
        ctx.strokeStyle = green;
        ctx.lineWidth = 2;
        ctx.moveTo(cx, cy);
        // Από 360 το πήγαμε 350 για να μην ακουμπάει το νέο πλαίσιο
        ctx.lineTo(cx + 350 * Math.cos(rad), cy + 350 * Math.sin(rad));
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rad);
        ctx.font = "bold 42px Arial";
        ctx.fillStyle = green;
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom"; 

        // Η λέξη ΓΗΛΟΦΟΣ κεντραρισμένη πάνω στον δείκτη
        if (ang > 0 && ang < 180) {
            ctx.fillText("ΓΗΛΟΦΟΣ", 180, -5); 
        } else {
            ctx.rotate(Math.PI);
            ctx.fillText("ΓΗΛΟΦΟΣ", -180, -5);
        }
        ctx.restore();

        // Κεντρική τελεία
        ctx.beginPath(); 
        ctx.arc(cx, cy, 12, 0, 2*Math.PI); 
        ctx.fillStyle = green; 
        ctx.fill();
        
        requestAnimationFrame(draw);
    }

    function drawH(a, l, w, c) {
        const r = (a - 90) * Math.PI / 180;
        ctx.beginPath(); 
        ctx.strokeStyle = c;
        ctx.lineWidth = w; 
        ctx.lineCap = "round";
        ctx.moveTo(400, 400); 
        ctx.lineTo(400 + l * Math.cos(r), 400 + l * Math.sin(r));
        ctx.stroke();
    }

    img.onload = () => draw();
</script>
</body>
</html>
