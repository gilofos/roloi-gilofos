<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ΓΗΛΟΦΟΣ - Smart Clock</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        canvas { width: 600px; height: 600px; max-width: 90vw; max-height: 90vw; aspect-ratio: 1 / 1; }
    </style>
</head>
<body>
<canvas id="c" width="800" height="800"></canvas>
<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = 'face.png';

    let temp = "--°C"; // Αρχική τιμή θερμοκρασίας

    // Λειτουργία για να παίρνουμε τον καιρό (Γήλοφος)
    async function getWeather() {
        try {
            // Χρησιμοποιούμε ένα ελεύθερο API για τη θερμοκρασία της περιοχής
            const response = await fetch('https://open-meteo.com');
            const data = await response.json();
            temp = Math.round(data.current_weather.temperature) + "°C";
        } catch (e) { temp = ""; }
    }
    getWeather();
    setInterval(getWeather, 600000); // Ανανέωση κάθε 10 λεπτά

    function draw() {
        const now = new Date();
        const s = now.getSeconds() + now.getMilliseconds() / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;
        
        ctx.clearRect(0, 0, 800, 800);
        if (img.complete) ctx.drawImage(img, 0, 0, 800, 800);
        
        const green = "#39FF14";
        const cx = 400, cy = 400;

        // --- 1. ΠΛΗΡΟΦΟΡΙΕΣ (ΗΜΕΡΟΜΗΝΙΑ & ΚΑΙΡΟΣ) ---
        ctx.fillStyle = green;
        ctx.textAlign = "center";
        
        // Ημερομηνία κάτω από το κέντρο
        ctx.font = "30px Arial";
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        const dateStr = now.toLocaleDateString('el-GR', options);
        ctx.fillText(dateStr.toUpperCase(), cx, cy + 120);

        // Θερμοκρασία πάνω από το κέντρο
        ctx.font = "bold 35px Arial";
        ctx.fillText(temp, cx, cy - 120);

        // --- 2. ΔΕΙΚΤΕΣ ΩΡΑΣ & ΛΕΠΤΩΝ ---
        drawH(h * 30, 200, 15, green);
        drawH(m * 6, 300, 10, green);

        // --- 3. ΓΗΛΟΦΟΣ ΣΤΑ ΔΕΥΤΕΡΟΛΕΠΤΑ ---
        const ang = s * 6;
        const rad = (ang - 90) * Math.PI / 180;
        
        ctx.beginPath();
        ctx.strokeStyle = green;
        ctx.lineWidth = 2;
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + 360 * Math.cos(rad), cy + 360 * Math.sin(rad));
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rad);
        ctx.font = "bold 42px Arial";
        ctx.textBaseline = "bottom"; 

        if (ang > 0 && ang < 180) {
            ctx.fillText("ΓΗΛΟΦΟΣ", 200, -5); 
        } else {
            ctx.rotate(Math.PI);
            ctx.fillText("ΓΗΛΟΦΟΣ", -200, -5);
        }
        ctx.restore();

        // Κέντρο
        ctx.beginPath(); ctx.arc(cx, cy, 12, 0, 2*Math.PI); ctx.fillStyle = green; ctx.fill();
        
        requestAnimationFrame(draw);
    }

    function drawH(a, l, w, c) {
        const r = (a - 90) * Math.PI / 180;
        ctx.beginPath(); ctx.strokeStyle = c; ctx.lineWidth = w; ctx.lineCap = "round";
        ctx.moveTo(400, 400); ctx.lineTo(400 + l * Math.cos(r), 400 + l * Math.sin(r));
        ctx.stroke();
    }

    img.onload = () => draw();
</script>
</body>
</html>
