<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ΩΡΑ ΓΗΛΟΦΟΥ</title>
    <style>
        body { 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        canvas { 
            /* Κλείδωσε τις διαστάσεις για να μην ξαναγίνει "αυγό" */
            width: auto;
            height: auto;
            max-width: 98vw;
            max-height: 98vh;
            aspect-ratio: 1 / 1;
            object-fit: contain;
            background: #000;
        }
    </style>
</head>
<body>
<canvas id="c" width="1000" height="1000"></canvas>
<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = 'face.png';

    function draw() {
        const now = new Date();
        const s = now.getSeconds() + now.getMilliseconds() / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;
        
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, 1000, 1000);

        const green = "#39FF14";
        const cx = 500, cy = 500;

        // 1. ΣΧΕΔΙΑΣΗ FACE (ΧΩΡΙΣ ΖΟΥΛΗΓΜΑ - 1000x1000)
        if (img.complete) {
            // Την σχεδιάζουμε τέλεια συμμετρική για να μην πατιούνται οι αριθμοί
            ctx.drawImage(img, 0, 0, 1000, 1000);
        }

        // 2. ΠΡΑΣΙΝΟ ΠΛΑΙΣΙΟ - *ΤΟΜΗ:* ΤΟ ΜΕΓΑΛΩΝΟΥΜΕ ΛΙΓΟ ΓΙΑ ΝΑ ΑΝΟΙΞΕΙ
        ctx.beginPath();
        // Ακτίνα 498 (αντί για 492) για να "αναπνεύσει" Ανατολικά-Δυτικά
        ctx.arc(cx, cy, 498, 0, 2 * Math.PI);
        ctx.strokeStyle = green;
        ctx.lineWidth = 4;
        ctx.stroke();

        // 3. ΔΕΙΚΤΕΣ (ΩΡΑ - ΛΕΠΤΟ)
        drawH(h * 30, 250, 16, green);
        drawH(m * 6, 380, 10, green);

        // 4. ΔΕΥΤΕΡΟΛΕΠΤΗΣ (ΓΗΛΟΦΟΣ) - ΚΟΝΤΟΣ
        const ang = s * 6;
        const rad = (ang - 90) * Math.PI / 180;
        ctx.beginPath();
        ctx.strokeStyle = green;
        ctx.lineWidth = 2.5;
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + 380 * Math.cos(rad), cy + 380 * Math.sin(rad));
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rad);
        ctx.font = "bold 38px Arial";
        ctx.fillStyle = green;
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom"; 
        if (ang > 0 && ang < 180) {
            ctx.fillText("ΓΗΛΟΦΟΣ", 200, -8); 
        } else {
            ctx.rotate(Math.PI);
            ctx.fillText("ΓΗΛΟΦΟΣ", -200, -8);
        }
        ctx.restore();

        // ΚΕΝΤΡΟ
        ctx.beginPath(); ctx.arc(cx, cy, 10, 0, 2*Math.PI); ctx.fillStyle = green; ctx.fill();
        
        requestAnimationFrame(draw);
    }

    function drawH(a, l, w, c) {
        const r = (a - 90) * Math.PI / 180;
        ctx.beginPath(); ctx.strokeStyle = c; ctx.lineWidth = w; ctx.lineCap = "round";
        ctx.moveTo(500, 500); ctx.lineTo(500 + l * Math.cos(r), 500 + l * Math.sin(r)); ctx.stroke();
    }
    img.onload = () => draw();
</script>
</body>
</html>
