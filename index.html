<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <title>ΓΗΛΟΦΟΣ - Ρολόι</title>
    <style>
        body { 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        canvas { 
            width: 600px; 
            height: 600px; 
            max-width: 95vw; 
            max-height: 95vw; 
            aspect-ratio: 1 / 1; 
        }
    </style>
</head>
<body>
<canvas id="c" width="800" height="800"></canvas>
<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = 'face.png';

    function draw() {
        const now = new Date();
        const s = now.getSeconds() + now.getMilliseconds() / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;
        
        ctx.clearRect(0, 0, 800, 800);
        if (img.complete) ctx.drawImage(img, 0, 0, 800, 800);
        
        const green = "#39FF14";
        const cx = 400, cy = 400;

        drawH(h * 30, 200, 15, green);
        drawH(m * 6, 300, 10, green);

        const ang = s * 6;
        const rad = (ang - 90) * Math.PI / 180;
        
        ctx.beginPath();
        ctx.strokeStyle = green;
        ctx.lineWidth = 2;
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + 360 * Math.cos(rad), cy + 360 * Math.sin(rad));
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rad);
        ctx.font = "bold 42px Arial";
        ctx.fillStyle = green;
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom"; 

        if (ang > 0 && ang < 180) {
            ctx.fillText("ΓΗΛΟΦΟΣ", 200, -5); 
        } else {
            ctx.rotate(Math.PI);
            ctx.fillText("ΓΗΛΟΦΟΣ", -200, -5);
        }
        ctx.restore();

        ctx.beginPath(); 
        ctx.arc(cx, cy, 12, 0, 2*Math.PI); 
        ctx.fillStyle = green; 
        ctx.fill();
        
        requestAnimationFrame(draw);
    }

    function drawH(a, l, w, c) {
        const r = (a - 90) * Math.PI / 180;
        ctx.beginPath(); 
        ctx.strokeStyle = c;
        ctx.lineWidth = w; 
        ctx.lineCap = "round";
        ctx.moveTo(400, 400); 
        ctx.lineTo(400 + l * Math.cos(r), 400 + l * Math.sin(r));
        ctx.stroke();
    }

    img.onload = () => draw();
</script>
</body>
</html>
