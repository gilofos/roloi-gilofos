<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ΓΗΛΟΦΟΣ - Seismos Watch</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        canvas { width: 600px; height: 600px; max-width: 90vw; max-height: 90vw; aspect-ratio: 1 / 1; }
    </style>
</head>
<body>
<canvas id="c" width="800" height="800"></canvas>
<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = 'face.png';

    let lastSeismos = "ΑΝΑΜΟΝΗ ΔΕΔΟΜΕΝΩΝ...";
    let seismosColor = "#39FF14"; // Ξεκινάει πράσινο

    // ΛΕΙΤΟΥΡΓΙΑ ΓΙΑ ΕΛΕΓΧΟ ΣΕΙΣΜΩΝ (Από USGS/EMSC)
    async function checkSeismos() {
        try {
            // Ψάχνουμε σεισμούς στην Ελλάδα (περιοχή γύρω από 38, 23)
            const response = await fetch('https://usgs.gov' + new Date(Date.now() - 86400000).toISOString() + '&minmagnitude=3&latitude=38&longitude=23&maxradiuskm=300');
            const data = await response.json();
            
            if (data.features.length > 0) {
                const latest = data.features[0].properties;
                const mag = latest.mag;
                const place = latest.place;
                lastSeismos = "ΣΕΙΣΜΟΣ: " + mag + "R - " + place.split(',')[0].toUpperCase();
                seismosColor = mag >= 4 ? "#FF0000" : "#FFA500"; // Κόκκινο αν είναι μεγάλος, πορτοκαλί αν είναι μέτριος
            } else {
                lastSeismos = "ΗΣΥΧΙΑ ΣΤΟΝ ΓΗΛΟΦΟ";
                seismosColor = "#39FF14";
            }
        } catch (e) { lastSeismos = "ΣΦΑΛΜΑ ΔΙΚΤΥΟΥ"; }
    }

    checkSeismos();
    setInterval(checkSeismos, 300000); // Έλεγχος κάθε 5 λεπτά

    function draw() {
        const now = new Date();
        const s = now.getSeconds() + now.getMilliseconds() / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;
        
        ctx.clearRect(0, 0, 800, 800);
        if (img.complete) ctx.drawImage(img, 0, 0, 800, 800);
        
        const green = "#39FF14";
        const cx = 400, cy = 400;

        // --- ΕΜΦΑΝΙΣΗ ΣΤΟΙΧΕΙΩΝ ---
        ctx.textAlign = "center";
        
        // 1. Ημερομηνία (Πάνω από το κέντρο)
        ctx.fillStyle = green;
        ctx.font = "25px Arial";
        const dateStr = now.toLocaleDateString('el-GR', { weekday: 'long', day: 'numeric', month: 'long' });
        ctx.fillText(dateStr.toUpperCase(), cx, cy - 140);

        // 2. Σεισμός (Κάτω από το κέντρο)
        ctx.fillStyle = seismosColor;
        ctx.font = "bold 28px Arial";
        ctx.fillText(lastSeismos, cx, cy + 140);

        // --- ΔΕΙΚΤΕΣ ---
        drawH(h * 30, 200, 15, green);
        drawH(m * 6, 300, 10, green);

        // --- ΓΗΛΟΦΟΣ ΣΤΑ ΔΕΥΤΕΡΟΛΕΠΤΑ ---
        const ang = s * 6;
        const rad = (ang - 90) * Math.PI / 180;
        ctx.beginPath(); ctx.strokeStyle = green; ctx.lineWidth = 2;
        ctx.moveTo(cx, cy); ctx.lineTo(cx + 360 * Math.cos(rad), cy + 360 * Math.sin(rad));
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy); ctx.rotate(rad);
        ctx.font = "bold 42px Arial"; ctx.textBaseline = "bottom"; 
        if (ang > 0 && ang < 180) { ctx.fillText("ΓΗΛΟΦΟΣ", 200, -5); } 
        else { ctx.rotate(Math.PI); ctx.fillText("ΓΗΛΟΦΟΣ", -200, -5); }
        ctx.restore();

        ctx.beginPath(); ctx.arc(cx, cy, 12, 0, 2*Math.PI); ctx.fillStyle = green; ctx.fill();
        requestAnimationFrame(draw);
    }

    function drawH(a, l, w, c) {
        const r = (a - 90) * Math.PI / 180;
        ctx.beginPath(); ctx.strokeStyle = c; ctx.lineWidth = w; ctx.lineCap = "round";
        ctx.moveTo(400, 400); ctx.lineTo(400 + l * Math.cos(r), 400 + l * Math.sin(r));
        ctx.stroke();
    }
    img.onload = () => draw();
</script>
</body>
</html>
