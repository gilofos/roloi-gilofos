<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json?v=5">
    <link rel="icon" type="image/png" href="icon2026.png">
    <link rel="apple-touch-icon" href="icon2026.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>ΩΡΑ ΓΗΛΟΦΟΥ</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        canvas { 
            width: 95vmin; 
            height: 95vmin; 
            max-width: 800px;
            max-height: 800px;
            display: block;
        }
    </style>
</head>
<body>
<canvas id="c" width="800" height="800"></canvas>
<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = 'face.png';

    function draw() {
        const now = new Date();
        const s = now.getSeconds() + now.getMilliseconds() / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;
        
        ctx.clearRect(0, 0, 800, 800);
        const green = "#39FF14";
        const cx = 400, cy = 400;

        // 1. ΠΛΑΙΣΙΟ - ΤΕΛΕΙΟΣ ΚΥΚΛΟΣ
        ctx.beginPath();
        ctx.arc(cx, cy, 395, 0, 2 * Math.PI);
        ctx.strokeStyle = green;
        ctx.lineWidth = 6;
        ctx.stroke();

        // 2. ΣΧΕΔΙΑΣΗ ΕΙΚΟΝΑΣ
        if (img.complete && img.naturalWidth !== 0) {
            ctx.drawImage(img, 15, 15, 770, 770);
        }

        // 3. ΔΕΙΚΤΕΣ ΩΡΑΣ/ΛΕΠΤΩΝ
        drawH(h * 30, 210, 14, green);
        drawH(m * 6, 310, 8, green);

        // 4. ΔΕΥΤΕΡΟΛΕΠΤΗΣ (ΚΟΝΤΟΣ)
        const ang = s * 6;
        const rad = (ang - 90) * Math.PI / 180;
        ctx.beginPath();
        ctx.strokeStyle = green;
        ctx.lineWidth = 2;
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + 310 * Math.cos(rad), cy + 310 * Math.sin(rad));
        ctx.stroke();

        // ΚΕΙΜΕΝΟ ΓΗΛΟΦΟΣ
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rad);
        ctx.font = "bold 34px Arial";
        ctx.fillStyle = green;
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom"; 
        if (ang > 0 && ang < 180) {
            ctx.fillText("ΓΗΛΟΦΟΣ", 160, -5); 
        } else {
            ctx.rotate(Math.PI);
            ctx.fillText("ΓΗΛΟΦΟΣ", -160, -5);
        }
        ctx.restore();

        // ΚΕΝΤΡΙΚΗ ΜΠΙΛΙΑ
        ctx.beginPath(); 
        ctx.arc(cx, cy, 8, 0, 2*Math.PI); 
        ctx.fillStyle = green; 
        ctx.fill();
        
        requestAnimationFrame(draw);
    }

    function drawH(a, l, w, c) {
        const r = (a - 90) * Math.PI / 180;
        ctx.beginPath(); 
        ctx.strokeStyle = c;
        ctx.lineWidth = w; 
        ctx.lineCap = "round";
        ctx.moveTo(400, 400); 
        ctx.lineTo(400 + l * Math.cos(r), 400 + l * Math.sin(r));
        ctx.stroke();
    }

    img.onload = () => draw();
    // Αν η εικόνα έχει ήδη φορτώσει, ξεκίνα το draw
    if (img.complete) draw();
</script>
</body>
</html>
