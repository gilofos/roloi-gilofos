<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ΓΗΛΟΦΟΣ - Perfect Symmetry</title>
    <style>
        body { 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        /* ΕΔΩ ΕΠΙΒΑΛΛΟΥΜΕ ΤΟΝ ΚΥΚΛΟ: Το ύψος και το πλάτος είναι ΙΔΙΑ */
        canvas { 
            width: 600px; 
            height: 600px; 
            max-width: 90vw; 
            max-height: 90vw; 
            aspect-ratio: 1 / 1; 
        }
    </style>
</head>
<body>
<canvas id="c" width="800" height="800"></canvas>
<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = 'face.png';

    function draw() {
        const now = new Date();
        const s = now.getSeconds() + now.getMilliseconds() / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;
        
        ctx.clearRect(0, 0, 800, 800);
        if (img.complete) ctx.drawImage(img, 0, 0, 800, 800);
        
        const green = "#39FF14";
        const cx = 400, cy = 400;

        // 1. Δείκτες Ώρας & Λεπτών
        drawH(h * 30, 200, 15, green);
        drawH(m * 6, 300, 10, green);

        // 2. ΔΕΥΤΕΡΟΛΕΠΤΑ & ΓΗΛΟΦΟΣ
        const ang = s * 6;
        const rad = (ang - 90) * Math.PI / 180;
        
        // Γραμμή δευτερολέπτων
        ctx.beginPath();
        ctx.strokeStyle = green;
        ctx.lineWidth = 2;
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + 360 * Math.cos(rad), cy + 360 * Math.sin(rad));
        ctx.stroke();

        // 3. ΕΞΥΠΝΗ ΠΕΡΙΣΤΡΟΦΗ ΛΕΞΗΣ (Αλλαγή στο 12 και στο 6)
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rad);

        ctx.font = "bold 42px Arial";
        ctx.fillStyle = green;
        ctx.textAlign = "center";

        // Έλεγχος: Από το 0 έως το 180 (12 έως 6) και από 180 έως 360 (6 έως 12)
        if (ang > 0 && ang < 180) {
            // Δεξί μισό: Η λέξη κοιτάζει προς τα έξω/κάτω
            ctx.textBaseline = "top"; 
            ctx.fillText("ΓΗΛΟΦΟΣ", 200, 5); 
        } else {
            // Αριστερό μισό: Τουμπάρουμε τη λέξη για να διαβάζεται από κάτω προς τα πάνω
            ctx.rotate(Math.PI);
            ctx.textBaseline = "top";
            ctx.fillText("ΓΗΛΟΦΟΣ", -200, 5);
        }
        ctx.restore();

        // Κέντρο
        ctx.beginPath(); ctx.arc(cx, cy, 12, 0, 2*Math.PI); ctx.fillStyle = green; ctx.fill();
        
        requestAnimationFrame(draw);
    }

    function drawH(a, l, w, c) {
        const r = (a - 90) * Math.PI / 180;
        ctx.beginPath(); ctx.strokeStyle = c; ctx.lineWidth = w; ctx.lineCap = "round";
        ctx.moveTo(400, 400); ctx.lineTo(400 + l * Math.cos(r), 400 + l * Math.sin(r));
        ctx.stroke();
    }

    img.onload = () => draw();
</script>
</body>
</html>
