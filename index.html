<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ΩΡΑ ΓΗΛΟΦΟΥ</title>
    <style>
        body { 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        canvas { 
            /* Μαζεύουμε το μέγεθος για να χωράει άνετα στην οθόνη */
            max-width: 92vw; 
            max-height: 92vh;
            object-fit: contain;
        }
    </style>
</head>
<body>
<canvas id="c" width="820" height="800"></canvas>
<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = 'face.png';

    function draw() {
        const now = new Date();
        const s = now.getSeconds() + now.getMilliseconds() / 1000;
        const m = now.getMinutes() + s / 60;
        const h = (now.getHours() % 12) + m / 60;
        
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, 820, 800);
        
        const green = "#39FF14";
        const cx = 410; // Το νέο κέντρο για να είναι ζυγισμένο
        const cy = 400;

        if (img.complete) {
            // Σχεδιάζουμε την εικόνα με 820 πλάτος για να στρογγυλέψει
            // χωρίς να βγαίνει έξω από το πλάνο
            ctx.drawImage(img, 0, 0, 820, 800);
        }

        // ΔΕΙΚΤΕΣ
        drawH(h * 30, 200, 14, green);
        drawH(m * 6, 310, 8, green);

        // ΔΕΥΤΕΡΟΛΕΠΤΗΣ (ΓΗΛΟΦΟΣ)
        const ang = s * 6;
        const rad = (ang - 90) * Math.PI / 180;
        ctx.beginPath();
        ctx.strokeStyle = green;
        ctx.lineWidth = 2.5;
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + 310 * Math.cos(rad), cy + 310 * Math.sin(rad));
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(rad);
        ctx.font = "bold 36px Arial";
        ctx.fillStyle = green;
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom"; 
        if (ang > 0 && ang < 180) {
            ctx.fillText("ΓΗΛΟΦΟΣ", 160, -5); 
        } else {
            ctx.rotate(Math.PI);
            ctx.fillText("ΓΗΛΟΦΟΣ", -160, -5);
        }
        ctx.restore();

        // ΚΕΝΤΡΟ
        ctx.beginPath(); ctx.arc(cx, cy, 10, 0, 2*Math.PI); ctx.fillStyle = green; ctx.fill();
        
        requestAnimationFrame(draw);
    }

    function drawH(a, l, w, c) {
        const r = (a - 90) * Math.PI / 180;
        ctx.beginPath(); ctx.strokeStyle = c; ctx.lineWidth = w; ctx.lineCap = "round";
        ctx.moveTo(410, 400); ctx.lineTo(410 + l * Math.cos(r), 400 + l * Math.sin(r)); ctx.stroke();
    }
    img.onload = () => draw();
</script>
</body>
</html>
